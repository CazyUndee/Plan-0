name: Plan 0 Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    name: Verify Plan 0 Project
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc nasm binutils qemu-system-x86 grub-pc-bin xorriso
        
    - name: Verify project structure
      run: |
        echo "=== Verifying Plan 0 Project Structure ==="

        # Check core files exist
        required_files=(
          "src/kernel/kernel.c"
          "src/memory/memory.c"
          "src/memory/paging.c"
          "src/memory/kheap.c"
          "src/fs/fs.c"
          "src/ui/shell.c"
          "src/drivers/part.c"
          "boot/boot.asm"
          "boot/interrupts.asm"
          "Makefile"
          "linker/linker.ld"
        )

        all_files_exist=true
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file"
          else
            echo "✗ $file"
            all_files_exist=false
          fi
        done

        if [ "$all_files_exist" = true ]; then
          echo "✅ All required files present"
        else
          echo "❌ Missing files detected"
          exit 1
        fi
        
    - name: Check for 32-bit remnants
      run: |
        echo "=== Checking for 32-bit remnants ==="
        
        bad_patterns=(
          "kernel64"
          "pmm64" 
          "paging64"
          "kheap64"
          "idt64"
          "gdt64"
          "boot64"
          "interrupts64"
        )
        
        found_32bit=false
        for pattern in "${bad_patterns[@]}"; do
          if find . -name "*$pattern*" 2>/dev/null | grep -q .; then
            echo "✗ Found 32-bit remnants: $pattern"
            found_32bit=true
          fi
        done
        
        if [ "$found_32bit" = false ]; then
          echo "✅ No 32-bit remnants found"
        else
          echo "❌ 32-bit remnants detected"
          exit 1
        fi
        
    - name: Verify naming consistency
      run: |
        echo "=== Verifying naming consistency ==="

        # Check branding in key files (informational)
        if grep -q "Plan 0\|Plan0" src/kernel/kernel.c 2>/dev/null; then
          echo "✓ Plan 0 naming found in kernel.c"
        else
          echo "? Plan 0 naming not found in kernel.c (informational)"
        fi

        if grep -q "Plan 0\|Plan0" src/fs/fs.c 2>/dev/null; then
          echo "✓ Plan 0 branding in fs.c"
        else
          echo "? Plan 0 branding not found in fs.c (informational)"
        fi

        if grep -q "Plan 0\|Plan0" src/ui/shell.c 2>/dev/null; then
          echo "✓ Plan 0 branding in shell.c"
        else
          echo "? Plan 0 branding not found in shell.c (informational)"
        fi
        
    - name: Check Makefile configuration
      run: |
        echo "=== Verifying Makefile ==="

        if grep -q "KERNEL = plan0" Makefile; then
          echo "✓ Plan 0 target configured"
        else
          echo "✗ Plan 0 target not found"
          exit 1
        fi

        if grep -q "BOOTDIR = boot" Makefile; then
          echo "✓ Boot directory reference updated"
        else
          echo "✗ Boot directory reference incorrect"
          exit 1
        fi

        if grep -q "linker/linker.ld" Makefile; then
          echo "✓ Linker script reference updated"
        else
          echo "✗ Linker script reference incorrect"
          exit 1
        fi
        
    - name: Test compilation
      run: |
        echo "=== Testing compilation ==="
        
        # Check tools
        make check
        
        # Try to build
        echo "Building Plan 0..."
        if make all; then
          echo "✅ Build successful"
          
          # Check if kernel binary exists
          if [ -f "bin/plan0.bin" ]; then
            echo "✅ Plan 0 binary created"
            ls -la bin/plan0.bin
          else
            echo "✗ Plan 0 binary not found"
            exit 1
          fi
        else
          echo "❌ Build failed"
          exit 1
        fi
        
    - name: Create ISO test
      run: |
        echo "=== Testing ISO creation ==="
        
        if make iso; then
          echo "✅ ISO creation successful"
          
          if [ -f "bin/os.iso" ]; then
            echo "✅ ISO file created"
            ls -la bin/os.iso
          else
            echo "✗ ISO file not found"
            exit 1
          fi
        else
          echo "❌ ISO creation failed"
          exit 1
        fi
        
    - name: Basic boot test
      run: |
        echo "=== Running basic boot test ==="

        # Quick QEMU boot test (timeout after 10 seconds)
        timeout 10s qemu-system-x86_64 -kernel bin/plan0.bin -display none -serial stdio -m 128M 2>&1 | tee boot_test.log || true

        if grep -qi "plan.0\|plan0" boot_test.log; then
          echo "✅ Plan 0 branding detected in boot"
        else
          echo "? Plan 0 branding not detected in boot (informational)"
        fi

        if grep -qi "multiboot" boot_test.log; then
          echo "✅ Multiboot detected"
        else
          echo "? Multiboot status unclear (informational)"
        fi

        echo "=== Boot test log ==="
        cat boot_test.log
        
    - name: Summary
      run: |
        echo "=== Verification Summary ==="
        echo "✅ Project structure verified"
        echo "✅ No 32-bit remnants"
        echo "✅ Naming consistent"
        echo "✅ Build system functional"
        echo "✅ Compilation successful"
        echo "✅ ISO creation working"
        echo "✅ Basic boot test passed"
        echo ""
        echo "Plan 0 project is ready for main branch!"
