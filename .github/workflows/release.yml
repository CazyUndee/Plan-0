name: Release

on:
  push:
    tags:
    - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc nasm xorriso grub-pc-bin mtools xxd

    - name: Build 64-bit kernel
      run: |
        mkdir -p obj/kernel obj/memory obj/fs obj/arch obj/drivers obj/process obj/ui bin

        # Build boot assembly
        nasm -f elf64 boot/boot.asm -o obj/boot.o
        nasm -f elf64 boot/interrupts.asm -o obj/interrupts.o
        nasm -f elf64 boot/context_switch.asm -o obj/context_switch.o
        nasm -f elf64 boot/syscall.asm -o obj/syscall.o

        # Build architecture files
        nasm -f elf64 src/arch/gdt_flush.asm -o obj/arch/gdt_flush.o

        # Build C sources by directory
        gcc -m64 -c src/kernel/kernel.c -o obj/kernel/kernel.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/kernel/sys.c -o obj/kernel/sys.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/kernel/system_calls.c -o obj/kernel/system_calls.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/kernel/elf.c -o obj/kernel/elf.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/kernel/elf_loader.c -o obj/kernel/elf_loader.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/kernel/state_graph.c -o obj/kernel/state_graph.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/kernel/intent_dispatcher.c -o obj/kernel/intent_dispatcher.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/kernel/switch.c -o obj/kernel/switch.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large

        # Build memory management
        gcc -m64 -c src/memory/memory.c -o obj/memory/memory.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/memory/kheap.c -o obj/memory/kheap.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/memory/paging.c -o obj/memory/paging.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large

        # Build filesystem
        gcc -m64 -c src/fs/fs.c -o obj/fs/fs.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/fs/vfs.c -o obj/fs/vfs.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/fs/ramfs.c -o obj/fs/ramfs.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large

        # Build architecture
        gcc -m64 -c src/arch/gdt.c -o obj/arch/gdt.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/arch/idt.c -o obj/arch/idt.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/arch/tss.c -o obj/arch/tss.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/arch/pic.c -o obj/arch/pic.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/arch/timer.c -o obj/arch/timer.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/arch/cpu_exceptions.c -o obj/arch/cpu_exceptions.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/arch/interrupt_handlers.c -o obj/arch/interrupt_handlers.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large

        # Build drivers
        gcc -m64 -c src/drivers/disk.c -o obj/drivers/disk.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/drivers/vga.c -o obj/drivers/vga.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/drivers/hid.c -o obj/drivers/hid.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/drivers/input.c -o obj/drivers/input.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/drivers/usb_host.c -o obj/drivers/usb_host.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/drivers/serial.c -o obj/drivers/serial.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/drivers/io.c -o obj/drivers/io.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/drivers/part.c -o obj/drivers/part.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/drivers/partition_table.c -o obj/drivers/partition_table.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/drivers/rtc.c -o obj/drivers/rtc.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large

        # Build process management
        gcc -m64 -c src/process/process.c -o obj/process/process.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/process/scheduler.c -o obj/process/scheduler.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/process/programs.c -o obj/process/programs.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/process/vm.c -o obj/process/vm.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large

        # Build UI
        gcc -m64 -c src/ui/shell.c -o obj/ui/shell.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/ui/ui_command.c -o obj/ui/ui_command.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large
        gcc -m64 -c src/ui/ui_state.c -o obj/ui/ui_state.o \
          -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
          -Iinclude -mcmodel=large

        # Link kernel
        ld -m elf_x86_64 -T linker/linker.ld -nostdlib -o bin/plan0.bin obj/boot.o obj/interrupts.o obj/context_switch.o obj/syscall.o obj/**/*.o

    - name: Create bootable ISO
      run: |
        mkdir -p iso/boot/grub
        cp bin/plan0.bin iso/boot/kernel

        cat > iso/boot/grub/grub.cfg << 'EOF'
        set timeout=5
        set default=0

        menuentry "Plan 0" {
            multiboot /boot/kernel
            boot
        }
        EOF

        grub-mkrescue -o bin/plan0-${{ github.ref_name }}.iso iso

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/plan0-${{ github.ref_name }}.iso
          bin/plan0.bin
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}