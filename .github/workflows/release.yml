name: Release (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (must already exist)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.tag }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc nasm xorriso grub-pc-bin mtools xxd

    - name: Build 64-bit kernel
      run: |
        mkdir -p obj/kernel obj/memory obj/fs obj/arch obj/drivers obj/process obj/ui bin
        nasm -f elf64 boot/boot.asm -o obj/boot.o
        nasm -f elf64 boot/interrupts.asm -o obj/interrupts.o
        nasm -f elf64 boot/context_switch.asm -o obj/context_switch.o
        nasm -f elf64 boot/syscall.asm -o obj/syscall.o
        nasm -f elf64 src/arch/gdt_flush.asm -o obj/arch/gdt_flush.o

        for dir in kernel memory fs arch drivers process ui; do
          for src in src/$dir/*.c; do
            [ -f "$src" ] || continue
            name=$(basename "$src" .c)
            gcc -m64 -c "$src" -o "obj/$dir/$name.o" \
              -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
              -Iinclude -mcmodel=large
          done
        done

        ld -m elf_x86_64 -T linker/linker.ld -nostdlib -o bin/plan0.bin obj/boot.o obj/interrupts.o obj/context_switch.o obj/syscall.o obj/**/*.o

    - name: Create bootable ISO
      run: |
        mkdir -p iso/boot/grub
        cp bin/plan0.bin iso/boot/kernel
        cat > iso/boot/grub/grub.cfg << 'EOF'
        set timeout=5
        set default=0
        menuentry "Plan 0" {
            multiboot /boot/kernel
            boot
        }
        EOF
        grub-mkrescue -o bin/plan0-${{ github.event.inputs.tag }}.iso iso

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.tag }}
        files: |
          bin/plan0-${{ github.event.inputs.tag }}.iso
          bin/plan0.bin
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
