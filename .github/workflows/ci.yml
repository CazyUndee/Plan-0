name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags:
    - 'v*'
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc nasm qemu-system-x86 xorriso grub-pc-bin mtools xxd

      - name: Assemble boot
        run: |
          mkdir -p obj bin
          nasm -f elf64 boot/boot.asm -o obj/boot.o
          nasm -f elf64 boot/interrupts.asm -o obj/interrupts.o
          nasm -f elf64 boot/context_switch.asm -o obj/context_switch.o
          nasm -f elf64 boot/syscall.asm -o obj/syscall_asm.o

      - name: Build user program
        run: |
          cd user
          make clean || true
          make init.elf init.bin 2>/dev/null || echo "User binary skipped"
          cd ..

      - name: Compile kernel
        run: |
          mkdir -p obj/kernel obj/memory obj/fs obj/arch obj/drivers obj/process obj/ui

          for src in kernel sys elf state_graph intent_dispatcher intent_schema switch; do
            if [ -f "src/kernel/${src}.c" ]; then
              gcc -m64 -c "src/kernel/${src}.c" -o "obj/kernel/${src}.o" \
                -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
                -Iinclude -mcmodel=large -g -O2 -Wno-unused-variable
            fi
          done

          for src in memory kheap paging; do
            if [ -f "src/memory/${src}.c" ]; then
              gcc -m64 -c "src/memory/${src}.c" -o "obj/memory/${src}.o" \
                -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
                -Iinclude -mcmodel=large -g -O2 -Wno-unused-variable
            fi
          done

          for src in fs vfs ramfs; do
            if [ -f "src/fs/${src}.c" ]; then
              gcc -m64 -c "src/fs/${src}.c" -o "obj/fs/${src}.o" \
                -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
                -Iinclude -mcmodel=large -g -O2 -Wno-unused-variable
            fi
          done

          for src in gdt idt tss pic timer cpu_exceptions; do
            if [ -f "src/arch/${src}.c" ]; then
              gcc -m64 -c "src/arch/${src}.c" -o "obj/arch/${src}.o" \
                -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
                -Iinclude -mcmodel=large -g -O2 -Wno-unused-variable
            fi
          done

          for src in disk vga hid input usb_host serial io partition_table rtc pci ehci net; do
            if [ -f "src/drivers/${src}.c" ]; then
              gcc -m64 -c "src/drivers/${src}.c" -o "obj/drivers/${src}.o" \
                -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
                -Iinclude -mcmodel=large -g -O2 -Wno-unused-variable
            fi
          done

          for src in process scheduler programs vm; do
            if [ -f "src/process/${src}.c" ]; then
              gcc -m64 -c "src/process/${src}.c" -o "obj/process/${src}.o" \
                -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
                -Iinclude -mcmodel=large -g -O2 -Wno-unused-variable
            fi
          done

          for src in ui_command ui_state shell; do
            if [ -f "src/ui/${src}.c" ]; then
              gcc -m64 -c "src/ui/${src}.c" -o "obj/ui/${src}.o" \
                -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
                -Iinclude -mcmodel=large -g -O2 -Wno-unused-variable
            fi
          done

          nasm -f elf64 src/arch/gdt_flush.asm -o obj/arch/gdt_flush.o
          nasm -f elf64 boot/switch_to_pcid.asm -o obj/switch_to_pcid.o

      - name: Link kernel
        run: ld -m elf_x86_64 -T linker/linker.ld -nostdlib -o bin/plan0.bin obj/boot.o obj/interrupts.o obj/context_switch.o obj/syscall_asm.o obj/switch_to_pcid.o obj/**/*.o

      - name: Show kernel
        run: |
          ls -la bin/plan0.bin
          file bin/plan0.bin

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-bin
          path: bin/plan0.bin

      - name: Create ISO
        run: |
          mkdir -p iso/boot/grub
          cp bin/plan0.bin iso/boot/kernel
          cat > iso/boot/grub/grub.cfg << 'EOFGRUB'
          set timeout=0
          set default=0
          menuentry "Plan 0" {
              multiboot /boot/kernel
              boot
          }
          EOFGRUB
          grub-mkrescue -o bin/os.iso iso 2>&1 || echo "ISO creation may have failed"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: os-iso
          path: bin/os.iso

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc nasm qemu-system-x86 grub-pc-bin xorriso

      - name: Download kernel
        uses: actions/download-artifact@v4
        with:
          name: kernel-bin
          path: bin

      - name: Verify project structure
        run: |
          echo "=== Verifying Project Structure ==="
          required_files=(
            "src/kernel/kernel.c"
            "src/memory/memory.c"
            "src/memory/paging.c"
            "src/memory/kheap.c"
            "src/fs/fs.c"
            "src/ui/shell.c"
            "src/drivers/part.c"
            "boot/boot.asm"
            "boot/interrupts.asm"
            "Makefile"
            "linker/linker.ld"
          )
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then echo "✓ $file"; else echo "✗ $file"; exit 1; fi
          done

      - name: Check for 32-bit remnants
        run: |
          bad_patterns=(kernel64 pmm64 paging64 kheap64 idt64 gdt64 boot64 interrupts64)
          for pattern in "${bad_patterns[@]}"; do
            if find . -name "*$pattern*" 2>/dev/null | grep -q .; then
              echo "✗ Found 32-bit remnant: $pattern"; exit 1
            fi
          done

      - name: Check Makefile
        run: |
          grep -q "KERNEL = plan0" Makefile || exit 1
          grep -q "BOOTDIR = boot" Makefile || exit 1
          grep -q "linker/linker.ld" Makefile || exit 1

      - name: Basic boot test
        run: |
          timeout 10s qemu-system-x86_64 -kernel bin/plan0.bin -display none -serial stdio -m 128M 2>&1 | tee boot_test.log || true
          grep -qi "plan.0\|plan0" boot_test.log && echo "✅ Branding detected" || echo "? Branding not detected (informational)"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v') && needs.verify.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin

      - name: Create ISO
        run: |
          mkdir -p iso/boot/grub
          cp bin/kernel-bin/plan0.bin iso/boot/kernel
          cat > iso/boot/grub/grub.cfg << 'EOF'
          set timeout=5
          set default=0
          menuentry "Plan 0" {
              multiboot /boot/kernel
              boot
          }
          EOF
          grub-mkrescue -o bin/plan0-${{ github.ref_name }}.iso iso

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/plan0-${{ github.ref_name }}.iso
            bin/kernel-bin/plan0.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
